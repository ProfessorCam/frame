<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2c33"/>
      <stop offset="1" stop-color="#17171b"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ff756a"/>
      <stop offset="1" stop-color="#dc4238"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff594d" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ff594d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Tile -->
  <rect x="12" y="12" width="232" height="232" rx="52" ry="52"
        fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.09" stroke-width="1.6"/>

  <!-- Selection reticle (four corner brackets) -->
  <g fill="none" stroke="#f5f5f7" stroke-opacity="0.85" stroke-width="13"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M62 92 V62 H92"/>
    <path d="M194 92 V62 H164"/>
    <path d="M62 164 V194 H92"/>
    <path d="M194 164 V194 H164"/>
  </g>

  <!-- Record dot with glow -->
  <circle cx="128" cy="128" r="97" fill="url(#glow)"/>
  <circle cx="128" cy="128" r="51" fill="url(#dot)"/>
</svg>
